name: gate-check

# OFF: manual-only trigger, and the job is guarded with `if: false` so nothing runs.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gate-check:
    if: false   # <-- REMOVE THIS LINE TO ARM. Until then the job is skipped.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run gate check on changed concepts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
